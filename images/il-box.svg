<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg" width="600" height="160">
  <style>
    text { font-family: sans-serif; font-size: 12px; fill: #444441; }
  </style>

  <!-- Axis line -->
  <line x1="40" y1="120" x2="580" y2="120" stroke="#444441" stroke-width="1"/>

  <!-- Axis ticks and labels: 0 to 20 step 2 -->
  <line x1="40"  y1="120" x2="40"  y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="94"  y1="120" x2="94"  y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="148" y1="120" x2="148" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="202" y1="120" x2="202" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="256" y1="120" x2="256" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="310" y1="120" x2="310" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="364" y1="120" x2="364" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="418" y1="120" x2="418" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="472" y1="120" x2="472" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="526" y1="120" x2="526" y2="126" stroke="#444441" stroke-width="1"/>
  <line x1="580" y1="120" x2="580" y2="126" stroke="#444441" stroke-width="1"/>

  <text x="40"  y="140" text-anchor="middle">0</text>
  <text x="94"  y="140" text-anchor="middle">2</text>
  <text x="148" y="140" text-anchor="middle">4</text>
  <text x="202" y="140" text-anchor="middle">6</text>
  <text x="256" y="140" text-anchor="middle">8</text>
  <text x="310" y="140" text-anchor="middle">10</text>
  <text x="364" y="140" text-anchor="middle">12</text>
  <text x="418" y="140" text-anchor="middle">14</text>
  <text x="472" y="140" text-anchor="middle">16</text>
  <text x="526" y="140" text-anchor="middle">18</text>
  <text x="580" y="140" text-anchor="middle">20</text>

  <!-- Whisker left: min(2)=94 to Q1(5)=175 -->
  <line x1="94"  y1="70" x2="175" y2="70" stroke="#534AB7" stroke-width="1.5"/>
  <!-- Whisker right: Q3(8)=256 to max(18)=526 -->
  <line x1="256" y1="70" x2="526" y2="70" stroke="#534AB7" stroke-width="1.5"/>

  <!-- Min cap -->
  <line x1="94"  y1="55" x2="94"  y2="85" stroke="#534AB7" stroke-width="1.5"/>
  <!-- Max cap -->
  <line x1="526" y1="55" x2="526" y2="85" stroke="#534AB7" stroke-width="1.5"/>

  <!-- IQR box: Q1(5)=175 to Q3(8)=256, width=81 -->
  <rect x="175" y="45" width="81" height="50" fill="#CECBF6" stroke="#534AB7" stroke-width="1.5"/>

  <!-- Median line at median(6)=202 -->
  <line x1="202" y1="45" x2="202" y2="95" stroke="#3C3489" stroke-width="2.5"/>

  <!-- Mean cross at mean(6.82)=224 -->
  <line x1="218" y1="70" x2="230" y2="70" stroke="#BA7517" stroke-width="1.5"/>
  <line x1="224" y1="64" x2="224" y2="76" stroke="#BA7517" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="40" y="10" width="12" height="12" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="1.5"/>
  <text x="56" y="21">IQR (Q1–Q3)</text>
  <line x1="155" y1="16" x2="169" y2="16" stroke="#3C3489" stroke-width="2.5"/>
  <text x="173" y="21">Median</text>
  <line x1="240" y1="16" x2="252" y2="16" stroke="#BA7517" stroke-width="1.5"/>
  <line x1="246" y1="10" x2="246" y2="22" stroke="#BA7517" stroke-width="1.5"/>
  <text x="256" y="21">Mean</text>
</svg>
